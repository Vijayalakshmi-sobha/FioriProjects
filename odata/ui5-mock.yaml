# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.applexus.odata
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          - url: http://trvlinuxvm01.applexus.com:8001
            client: '100'
            destination: TR4
            path: /sap
          - url: http://trvlinuxvm01.applexus.com:8001
            client: '100'
            destination: TR4
            path: /sap/opu/odata/sap/ZB18_11_ODATA_DEEP_SALES_SRV/
          - url: http://trvlinuxvm01.applexus.com:8001
            client: '100'
            destination: TR4
            path: /sap/opu/odata/sap/ZB18_11_ODATA_DEEP_DEL_SRV/
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: sap-fe-mockserver
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /sap/opu/odata/sap/ZB18_11_ODATA_SRV
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/ZB18_11_ODATA_DEEP_SALES_SRV
            metadataPath: ./webapp/localService/ZB18_11_ODATA_DEEP_SALES_SRV/metadata.xml
            mockdataPath: ./webapp/localService/ZB18_11_ODATA_DEEP_SALES_SRV/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/ZB18_11_ODATA_DEEP_DEL_SRV
            metadataPath: ./webapp/localService/ZB18_11_ODATA_DEEP_DEL_SRV/metadata.xml
            mockdataPath: ./webapp/localService/ZB18_11_ODATA_DEEP_DEL_SRV/data
            generateMockData: true
        annotations: []
